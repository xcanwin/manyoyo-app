name: manyoyo_app
description: "MANYOYO native UI client for macOS, Windows, iOS, and Android."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # 保留
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.8

  # HTTP + Cookie
  dio: ^5.8.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.5

  # 路由
  go_router: ^15.1.2

  # 状态管理
  provider: ^6.1.2

  # 终端模拟器
  xterm: ^4.0.0

  # Markdown 渲染
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
